name: Build and Push Docker image

# Publishes healzangels/plex_nfo_exporter_options to Docker Hub.
# Triggers:
#   - push to main            -> tags :latest (and :main-<sha>)
#   - push of a version tag   -> tags :X.Y.Z, :X.Y, :latest  (e.g. git tag v2.2)
#   - manual run              -> via the "Run workflow" button
on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
      - 'v*.*'
  workflow_dispatch:

env:
  IMAGE_NAME: healzangels/plex_nfo_exporter_options

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=main-,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
