name: Build and Push Docker image

# Publishes healzangels/plex_nfo_exporter_options to Docker Hub.
#
# Branch model:
#   nightly branch  -> :nightly   (development; all changes land here first)
#   main branch     -> :latest    (release / promoted from nightly)
#   vX.Y.Z git tag  -> :X.Y.Z, :X.Y, :latest   (versioned release, e.g. git tag v2.2.0)
#   manual run      -> via the "Run workflow" button (workflow_dispatch)
#
# NOTE: version tags MUST be full SemVer (three parts). `v2.2` is invalid; use `v2.2.0`.
on:
  push:
    branches:
      - main
      - nightly
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  IMAGE_NAME: healzangels/plex_nfo_exporter_options

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # We control :latest explicitly below, so disable the automatic behaviour.
          flavor: |
            latest=false
          tags: |
            # main branch (release) -> :latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # nightly branch (development) -> :nightly
            type=raw,value=nightly,enable=${{ github.ref == 'refs/heads/nightly' }}
            # version tags like v2.2.0 -> :2.2.0 and :2.2
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # a versioned release also updates :latest
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
